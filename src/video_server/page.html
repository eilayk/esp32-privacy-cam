<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Camera Stream</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: #fff;
        }

        h1 {
            margin-bottom: 20px;
        }

        #stream {
            max-width: 90vw;
            max-height: 90vh;
            border: 2px solid #444;
            border-radius: 8px;
            display: block;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        .info {
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>ESP32 Privacy Camera</h1>
        <img id="stream" src="/stream" alt="Camera Stream" />
        <div class="info">Live MJPEG feed</div>
    </div>
</body>

</html>
