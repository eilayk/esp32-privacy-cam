<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Camera Stream</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: #fff;
        }

        h1 {
            margin-bottom: 20px;
        }

        #stream {
            max-width: 90vw;
            max-height: 90vh;
            border: 2px solid #444;
            border-radius: 8px;
            display: block;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        .info {
            color: #aaa;
            font-size: 14px;
        }

        .status {
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
        }

        .status.connected {
            background-color: #2d5;
            color: #000;
        }

        .status.disconnected {
            background-color: #d52;
            color: #fff;
        }

        .status.connecting {
            background-color: #fa0;
            color: #000;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>ESP32 Privacy Camera</h1>
        <canvas id="stream"></canvas>
        <div class="status connecting" id="status">Connecting...</div>
        <div class="info">Live WebSocket feed</div>
    </div>

    <script>
        const canvas = document.getElementById('stream');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        let ws = null;

        function updateStatus(text, state) {
            statusEl.textContent = text;
            statusEl.className = 'status ' + state;
        }

        function connect() {
            updateStatus('Connecting...', 'connecting');
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                console.log('WebSocket connected');
                updateStatus('Connected', 'connected');
            };

            ws.onmessage = (event) => {
                // Receive binary JPEG data
                const blob = new Blob([event.data], { type: 'image/jpeg' });
                const url = URL.createObjectURL(blob);
                
                const img = new Image();
                img.onload = () => {
                    // Resize canvas to match image dimensions (first frame only)
                    if (canvas.width === 0 || canvas.height === 0) {
                        canvas.width = img.width;
                        canvas.height = img.height;
                    }
                    
                    // Draw the image on canvas
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    URL.revokeObjectURL(url);
                };
                img.src = url;
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateStatus('Error', 'disconnected');
            };

            ws.onclose = () => {
                console.log('WebSocket closed');
                updateStatus('Disconnected', 'disconnected');
                
                // Attempt to reconnect after 2 seconds
                setTimeout(connect, 2000);
            };
        }

        // Start connection
        connect();
    </script>
</body>

</html>
