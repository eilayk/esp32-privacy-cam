<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Camera Stream</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: #fff;
        }

        h1 {
            margin-bottom: 20px;
        }

        #stream {
            width: 100%;
            height: auto;
            max-width: 90vw;
            max-height: 90vh;
            border: 2px solid #444;
            border-radius: 8px;
            display: block;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            width: min(980px, 94vw);
        }

        .info {
            color: #aaa;
            font-size: 14px;
        }

        .status {
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
        }

        .status.connected {
            background-color: #2d5;
            color: #000;
        }

        .status.disconnected {
            background-color: #d52;
            color: #fff;
        }

        .status.connecting {
            background-color: #fa0;
            color: #000;
        }

        .trace-panel {
            width: 100%;
            max-width: 860px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
        }

        .trace-summary {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            color: #ddd;
            font-size: 13px;
        }

        .metric {
            background: #191919;
            border: 1px solid #2f2f2f;
            border-radius: 6px;
            padding: 6px 10px;
        }

        .trace-title {
            margin: 0 0 8px;
            color: #ccc;
            font-size: 14px;
            letter-spacing: 0.02em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
        }

        th,
        td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #2a2a2a;
        }

        th {
            color: #bbb;
            font-weight: 600;
        }

        td {
            color: #8be9fd;
        }

        .empty-row td {
            color: #777;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>ESP32 Privacy Camera</h1>
        <canvas id="stream"></canvas>
        <div class="status connecting" id="status">Connecting...</div>
        <div class="info">Live WebSocket feed</div>

        <section class="trace-panel" aria-live="polite">
            <h2 class="trace-title">Performance Trace</h2>
            <div class="trace-summary">
                <div class="metric">FPS: <span id="fps">0.00</span></div>
                <div class="metric">Frame Time: <span id="total-ms">0.000</span> ms</div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Step</th>
                        <th>Duration (ms)</th>
                    </tr>
                </thead>
                <tbody id="trace-rows">
                    <tr class="empty-row">
                        <td colspan="2">Waiting for trace data...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>

    <script>
        const canvas = document.getElementById('stream');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const fpsEl = document.getElementById('fps');
        const totalMsEl = document.getElementById('total-ms');
        const traceRowsEl = document.getElementById('trace-rows');
        
        let ws = null;
        let isInit = false;
        
        // FPS calculation
        let frameTimestamps = [];
        const FPS_WINDOW_SIZE = 30;

        function updateStatus(text, state) {
            statusEl.textContent = text;
            statusEl.className = 'status ' + state;
        }
        
        function calculateFPS() {
            if (frameTimestamps.length < 2) return 0;
            
            const timeSpan = frameTimestamps[frameTimestamps.length - 1] - frameTimestamps[0];
            const fps = (frameTimestamps.length - 1) / (timeSpan / 1000);
            return fps;
        }
        
        function updateTraceMetrics(traceData) {
            // Update FPS
            const fps = calculateFPS();
            fpsEl.textContent = fps.toFixed(2);
            
            // Update total time
            totalMsEl.textContent = traceData.total_ms.toFixed(3);
            
            // Update trace steps table
            traceRowsEl.innerHTML = '';
            
            if (traceData.steps && traceData.steps.length > 0) {
                traceData.steps.forEach(step => {
                    const row = document.createElement('tr');
                    
                    const labelCell = document.createElement('td');
                    labelCell.textContent = step.label;
                    row.appendChild(labelCell);
                    
                    const durationCell = document.createElement('td');
                    durationCell.textContent = step.duration_ms.toFixed(3);
                    row.appendChild(durationCell);
                    
                    traceRowsEl.appendChild(row);
                });
            } else {
                const row = document.createElement('tr');
                row.className = 'empty-row';
                const cell = document.createElement('td');
                cell.colSpan = 2;
                cell.textContent = 'No trace steps recorded';
                row.appendChild(cell);
                traceRowsEl.appendChild(row);
            }
        }
        
        function decodeFrameMessage(arrayBuffer) {
            // Read trace JSON length (first 4 bytes, u32 little-endian)
            const view = new DataView(arrayBuffer);
            const traceLength = view.getUint32(0, true); // true = little-endian
            
            // Extract trace JSON
            const traceBytes = new Uint8Array(arrayBuffer, 4, traceLength);
            const traceJson = new TextDecoder().decode(traceBytes);
            const traceData = JSON.parse(traceJson);
            
            // Extract JPEG data
            const jpegOffset = 4 + traceLength;
            const jpegData = arrayBuffer.slice(jpegOffset);
            
            return { traceData, jpegData };
        }

        function connect() {
            updateStatus('Connecting...', 'connecting');
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                console.log('WebSocket connected');
                updateStatus('Connected', 'connected');
            };

            ws.onmessage = (event) => {
                // Track frame arrival time for FPS calculation
                const now = performance.now();
                frameTimestamps.push(now);
                if (frameTimestamps.length > FPS_WINDOW_SIZE) {
                    frameTimestamps.shift();
                }
                
                // Decode the binary message
                const { traceData, jpegData } = decodeFrameMessage(event.data);
                
                // Update trace metrics
                updateTraceMetrics(traceData);
                
                // Render JPEG frame
                const blob = new Blob([jpegData], { type: 'image/jpeg' });
                const url = URL.createObjectURL(blob);
                
                const img = new Image();
                img.onload = () => {
                    // Resize canvas to match image dimensions (first frame only)
                    if (!isInit) {
                        canvas.width = img.width;
                        canvas.height = img.height;
                        isInit = true;
                    }
                    
                    // Draw the image on canvas
                    ctx.drawImage(img, 0, 0);
                    URL.revokeObjectURL(url);
                };
                img.src = url;
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateStatus('Error', 'disconnected');
            };

            ws.onclose = () => {
                console.log('WebSocket closed');
                updateStatus('Disconnected', 'disconnected');
                
                // Attempt to reconnect after 2 seconds
                setTimeout(connect, 2000);
            };
        }

        // Start connection
        connect();
    </script>
</body>

</html>
